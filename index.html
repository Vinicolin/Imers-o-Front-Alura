<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css">
    <script src="tema.js" defer></script>
</head>
<body>
    <main>
        <header>
            <h1>Quem está assistindo?</h1>
            <button id="theme-toggle" aria-label="Alternar entre modo escuro e claro">🌙</button>
        </header>
        <nav aria-label="Seleção de perfis">
            <ul class="categories">
                <li>
                    <h3></h3>
                    <ol class="profiles">
                        <li class="profile" role="button" tabindex="0">
                            <figure>
                                <img src="/assets/perfil1.jpg" alt="Um close-up de um guerreiro medieval de aparência rústica e expressão intensa, com o rosto sujo e neve cobrindo seu capuz de pele e suas tranças. Ele encara a câmera diretamente. Ao fundo, uma vila cobrindo de neve e figuras em combate criam um cenário de batalha caótico.">
                                <figcaption>Vinicius</figcaption>
                            </figure>
                        </li>
                        <li class="profile" role="button" tabindex="0">
                            <figure>
                                <img src="/assets/perfil2.jpg" alt="Um close-up de uma guerreira de aparência rústica e expressão resoluta, com o rosto sujo e neve cobrindo seu capuz de pele e seu cabelo trançado. Ela encara a câmera diretamente. Ao fundo, uma vila cobrindo de neve e figuras em combate criam um cenário de batalha caótico, semelhante ao da primeira imagem.">
                                <figcaption>Natalia</figcaption>
                            </figure>
                        </li>
                        <li class="profile" role="button" tabindex="0">
                            <figure>
                                <img src="/assets/perfil3.jpg" alt="Um close-up de um jovem de aparência rústica e expressão pensativa, com o rosto sujo e neve cobrindo seu capuz de pele e seu cabelo trançado. Ele encara a câmera diretamente. Ao fundo, uma vila cobrindo de neve e figuras em combate criam um cenário de batalha caótico, semelhante ao das imagens anteriores.">
                                <figcaption>Miguel</figcaption>
                            </figure>
                        </li>
                    </ol>
                </li>
            </ul>
        </nav>
    </main>
        <script src="js/index.js"></script>
    </body>
</html>
